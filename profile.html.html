<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokalDeals - Your Saved Bookmarks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-red: #DC3545;
            --brand-yellow: #FFC107;
        }
        body {
            background-color: #fffdf5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bg-brand-gradient {
            background: linear-gradient(135deg, var(--brand-red), #bd2130);
        }
        .navbar-brand-custom {
            font-weight: 700;
            color: var(--brand-yellow) !important;
        }
        .navbar-brand-custom span {
            color: #ffffff;
        }
        .card-custom {
            border-radius: 1rem;
            border: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-brand-gradient shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="home.html">
                <i class="bi bi-lightning-fill text-warning"></i> Lokal<span>Deals</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#profileNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="profileNavbar">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link text-white me-2" href="home.html"><i class="bi bi-house-door"></i> Browse</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white active fw-semibold me-3" href="profile.html"><i class="bi bi-heart-fill text-warning"></i> Saved Deals</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm fw-bold px-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="card card-custom shadow-sm text-center p-4 bg-white border-0">
                    <div class="display-1 text-danger mb-2"><i class="bi bi-person-bounding-box"></i></div>
                    <h4 class="fw-bold text-dark mb-1">Sreeraj Jayasandran</h4>
                    <span class="badge bg-warning text-dark px-3 py-1 rounded-pill fw-bold mb-3">Consumer Account</span>
                    <p class="text-muted small mb-0"><i class="bi bi-envelope-fill me-1"></i> sreeraj@student.upm.edu.my</p>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-custom shadow-sm p-4 bg-white border-0">
                    <h4 class="fw-bold text-danger border-bottom pb-2 mb-4">
                        <i class="bi bi-bookmark-heart-fill text-warning me-2"></i>Your Active Saved Bookmarks
                    </h4>

                    <div class="d-flex flex-column gap-3" id="bookmarksContainer">
                        
                        <div class="p-3 bg-light rounded d-flex flex-column flex-sm-row justify-content-between align-items-sm-center border">
                            <div class="mb-3 mb-sm-0">
                                <span class="badge bg-danger mb-1 fw-bold">40% OFF</span>
                                <h5 class="fw-bold text-dark mb-1">RM2 Nasi Lemak Flash!</h5>
                                <small class="text-muted"><i class="bi bi-shop me-1"></i> Mamak Stall Ali</small>
                            </div>
                            <div class="d-flex gap-2">
                                <a href="deal-detail.html" class="btn btn-sm btn-outline-dark fw-bold px-3">Go to Deal</a>
                                <button class="btn btn-sm btn-danger text-white px-2" title="Remove Bookmark"><i class="bi bi-trash3"></i> Unsave</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
