<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokalDeals - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row login-container">
            <div class="col-lg-6 d-none d-lg-flex brand-banner align-items-center justify-content-center text-center text-white p-5">
                <div>
                    <h1 class="display-3 fw-bold mb-3" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">LokalDeals</h1>
                    <p class="fs-4 fw-light mb-4" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.4);">Hot flash discounts from your neighborhood Mamak stalls & eateries right to your screen!</p>
                </div>
            </div>
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white p-5">
                <div class="w-100" style="max-width: 450px;">
                    <div class="text-center mb-4 d-lg-none"><h2 class="fw-bold text-danger">LokalDeals</h2></div>
                    <h3 class="fw-bold text-dark mb-2">Welcome Back! 👋</h3>
                    <p class="text-muted mb-4">Log in to unlock hot food deals happening near you right now.</p>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="loginEmail" class="form-control" placeholder="enter your email" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-brand-primary btn-lg w-100 fw-bold mb-3 shadow-sm" style="background-color: #FFC107; color: #212529;">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Grab My Deals
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">New user? <a href="register.html" class="text-danger fw-bold text-decoration-none">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
