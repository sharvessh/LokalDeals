<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokalDeals - Post New Deal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="bg-white py-3 shadow-sm mb-5">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="business-dashboard.html" class="btn btn-outline-danger btn-sm fw-bold"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
            <span class="fw-bold text-dark"><i class="bi bi-shop text-warning me-1"></i> Ali's Mamak Stall</span>
        </div>
    </div>
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="card form-card shadow-lg bg-white overflow-hidden" style="border: none; border-radius: 1rem;">
                    <div class="row g-0">
                        <div class="col-md-5 side-promo-panel d-none d-md-flex p-5 flex-column justify-content-between">
                            <div>
                                <h3 class="fw-bold text-warning mb-3"><i class="bi bi-lightning-fill"></i> Flash Broadcasting</h3>
                                <p class="fw-light">When you publish a deal, notifications target shoppers within your local coordinate radius immediately!</p>
                            </div>
                        </div>
                        <div class="col-md-7 p-4 p-sm-5">
                            <h3 class="fw-bold text-dark mb-1">Create Promotion</h3>
                            <p class="text-muted mb-4">Fill out variables to display your deal on maps.</p>
                            <form id="postDealForm">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Deal Title</label>
                                    <input type="text" class="form-control form-control-lg" required placeholder="e.g., RM2 Nasi Lemak Flash Deal!">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Short Description</label>
                                    <textarea class="form-control" rows="3" required placeholder="Describe what customers get..."></textarea>
                                </div>
                                <div class="row">
                                    <div class="col-sm-6 mb-3">
                                        <label class="form-label fw-semibold">Discount Value (%)</label>
                                        <input type="number" class="form-control" min="1" max="100" placeholder="40" required>
                                    </div>
                                    <div class="col-sm-6 mb-3">
                                        <label class="form-label fw-semibold">Category Type</label>
                                        <select class="form-select" required>
                                            <option value="" selected disabled>Choose group...</option>
                                            <option value="FB">F&B</option>
                                            <option value="Groceries">Groceries</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Flash Expiration Time</label>
                                    <input type="datetime-local" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-brand-submit btn-lg w-100 shadow-sm py-3 mb-2">Broadcast Deal Now</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/business.js"></script>
</body>
</html>
