<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokalDeals - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-red: #DC3545;
            --brand-yellow: #FFC107;
            --brand-dark: #212529;
        }
        body {
            background-color: #fffdf5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            min-height: 100vh;
        }
        .brand-banner {
            background: linear-gradient(135deg, rgba(220, 53, 69, 0.9), rgba(255, 193, 7, 0.8)), 
                        url('https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }
        .btn-brand-primary {
            background-color: var(--brand-red);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-brand-primary:hover {
            background-color: #bd2130;
            color: white;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: var(--brand-yellow);
            box-shadow: 0 0 0 0.25 bg-warning;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row login-container">
            <div class="col-lg-6 d-none d-lg-flex brand-banner align-items-center justify-content-center text-center text-white p-5">
                <div>
                    <h1 class="display-3 fw-bold mb-3" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">LokalDeals</h1>
                    <p class="fs-4 fw-light mb-4" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.4);">Hot flash discounts from your neighborhood Mamak stalls & eateries right to your screen!</p>
                    <div class="spinner-grow text-warning" role="status"></div>
                </div>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white p-5">
                <div class="w-100" style="max-width: 450px;">
                    <div class="text-center mb-4 d-lg-none">
                        <h2 class="fw-bold text-danger">LokalDeals</h2>
                    </div>
                    
                    <h3 class="fw-bold text-dark mb-2">Welcome Back! 👋</h3>
                    <p class="text-muted mb-4">Log in to unlock hot food deals happening near you right now.</p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" placeholder="enter your email" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-brand-primary btn-lg w-100 fw-bold mb-3 shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Grab My Deals
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">New user? <a href="register.html" class="text-danger fw-bold text-decoration-none">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
